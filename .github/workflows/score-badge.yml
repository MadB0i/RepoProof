name: Score Badge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  badge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Generate Score Badge
        run: |
          node dist/cli.js scan . --format json --output score.json --quiet || true
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('score.json','utf8'));
            const badge = {
              schemaVersion: 1,
              label: 'repoproof',
              message: report.grade || '?',
              color: report.score >= 90 ? 'brightgreen' :
                     report.score >= 80 ? 'green' :
                     report.score >= 70 ? 'yellowgreen' :
                     report.score >= 60 ? 'yellow' : 'red'
            };
            fs.writeFileSync('badge.json', JSON.stringify(badge));
          "

      - uses: actions/upload-artifact@v4
        with:
          name: score-badge
          path: badge.json
