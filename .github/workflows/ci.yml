name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Coverage
        if: matrix.node-version == 22
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Smoke Test
        run: pnpm smoke

      - name: Scan Self
        run: |
          node dist/cli.js scan . \
            --config .repoproof.ci.json \
            --format html \
            --output repoproof-self-scan.html \
            --min-score 90 \
            --fail-on error

      - name: Upload Self-Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: self-scan-report
          path: repoproof-self-scan.html
        if: always()
